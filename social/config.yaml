# Storefront profile URL — for launch posts that don't spotlight a single product
storefront_url: "https://bpmiller02.gumroad.com/"

platforms:
  x:
    handle: "@bpmiller02"
    profile_url: "https://x.com/bpmiller02"
    char_limit: 280
    voice_modifier: "Terse. Punchy. One main idea per post. No threads unless absolutely necessary."
    hashtag_policy: "0–1 hashtags max, only if highly relevant"
    best_for: ["build-in-public", "quick lessons", "single-product spotlight"]
  mastodon:
    handle: "@bpmiller02@mastodon.social"
    profile_url: "https://mastodon.social/@bpmiller02"
    char_limit: 500
    voice_modifier: "Slightly more nerdy. Technical specifics welcome. Tag relevant instances/hashtags if natural."
    hashtag_policy: "1–2 hashtags, can be #indieweb #buildinpublic style"
    best_for: ["technical deep-dive", "tool recommendations", "small wins"]
  bluesky:
    handle: "@b-pmiller.bsky.social"
    profile_url: "https://bsky.app/profile/b-pmiller.bsky.social"
    char_limit: 300
    voice_modifier: "Warmer. Slightly more personal. Both sub-brands fit naturally here. Conversational."
    hashtag_policy: "0–1 hashtags. Conversational tone beats hashtag spam."
    best_for: ["product-spotlight", "creative process", "behind-the-scenes"]

# Post angles. Each defines a template shape. The ollama prompt will pull one
# of these per draft and fill in product + platform.
angles:
  build_in_public:
    label: "Build-in-public"
    shape: "What I just shipped / what I'm building now / what's broken"
    tone: "Honest, slightly tired, real"
    example: "Finally shipped the Client Onboarding Pack after three rewrites. Six Notion templates, one ugly but functional cover image, $14. Still need to write the welcome email."
  lessons_learned:
    label: "Lessons learned"
    shape: "One specific lesson from building/selling. Concrete, not generic."
    tone: "Reflective but concrete"
    example: "Custom landing pages convert better than Gumroad defaults — but only if the cover image is a real product shot, not a stock photo. Took me three products to learn this."
  product_spotlight:
    label: "Product spotlight"
    shape: "Lead with the problem, show the product as the resolution. Don't oversell."
    tone: "Quietly proud"
    example: "67% of client conflicts start in week one. Most of them are scope. Built a $14 Notion pack that fixes the intake, agenda, and contract before they become problems."
  behind_the_scenes:
    label: "Behind the scenes"
    shape: "Show a detail of the work. A number, a screenshot description, a decision."
    tone: "Curious, nerdy"
    example: "Spent 40 minutes yesterday arguing with myself about whether the buy button should be amber-400 or amber-500. Shipped amber-400. Nobody will notice. I will."
  customer_story:
    label: "Customer story / use case"
    shape: "Hypothetical or real use case. 'Someone using X for Y'."
    tone: "Observational"
    example: "Saw a designer use the Freelancer Admin Starter Kit to track 6 retainers in a single Notion page. Took her 20 minutes to set up. Replaced 3 different tools."

# BANNED PHRASES — if any of these appear, the draft is rejected and regenerated
banned_phrases:
  ai_tells:
    - "dive into"
    - "delve into"
    - "tapestry"
    - "elevate"
    - "leverage"
    - "unlock the power"
    - "in today's fast-paced world"
    - "in this day and age"
    - "navigate the complexities"
    - "robust solution"
    - "seamlessly"
    - "effortlessly"
    - "cutting-edge"
    - "game-changer"
    - "game changer"
    - "revolutionize"
    - "paradigm shift"
    - "embark on a journey"
    - "unleash"
    - "harness the power"
    - "in conclusion"
    - "moreover"
    - "furthermore"
  hard_sell:
    - "buy now"
    - "limited time"
    - "don't miss out"
    - "act fast"
    - "exclusive offer"
    - "massive discount"
    - "huge sale"
  cringe:
    - "excited to announce"
    - "thrilled to share"
    - "humbled"
    - "blessed"
    - "stay tuned"
    - "coming soon"   # allowed in some contexts but reject on launches
    - "🔥🔥🔥"

# Posting cadence (sustainable plan, not maxing quota)
cadence:
  week_1: 3   # launch week — Mon storefront announce, Wed lessons, Fri product spotlight
  week_2_onwards: 2  # sustainable: Wed + Sat
  preferred_times_et:
    x: "09:00"        # morning commute scroll
    mastodon: "10:00"
    bluesky: "14:00"  # afternoon check-in