# bpmiller02 Content Engine Config
# Drives the marketing-content-engine skill. Read by both the ollama client
# (system prompt) and the draft validator (banlist + brand checks).

brand:
  name: "bpmiller02"
  owner: "B.P. Miller"
  voice_summary: >
    Builder, not influencer. Talks like a friend who's actually shipped the thing,
    not a SaaS landing page. Two sub-brands under one account: bluepill02 (operator/
    technical) and BP Creative (lifestyle/artisan). Posts weave between them but
    always feel like the same person.
  tone_pillars:
    - "Direct. Numbers before adjectives."
    - "Mechanism before outcome. Show the how, not just the result."
    - "Quiet pride. Let the work speak."
    - "Honest about what's hard. No fake wins."
  voice_anti_patterns:
    - "Don't be chirpy or use emojis as filler"
    - "Don't open with a question ('Ever felt like...?')"
    - "Don't use 'excited to announce' / 'thrilled to share' / 'humbled'"
    - "Don't stack 3+ hashtags at the end"
    - "Don't fake-humble by listing credentials"

